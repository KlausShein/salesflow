directories:
  output: dist-electron-new
  buildResources: build
appId: com.salesflow.printpos
productName: Sales Flow
copyright: Copyright © 2026 Sales Flow
publish:
  provider: github
  owner: KlausShein
  repo: salesflow
  releaseType: release
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: src/assets/app-icon.ico
mac:
  target: dmg
  icon: src/assets/app-icon.png
  category: public.app-category.business
linux:
  target: AppImage
  icon: src/assets/app-icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sales Flow
  installerIcon: src/assets/app-icon.ico
  installerHeaderIcon: src/assets/app-icon.ico
files:
  - filter:
      - electron/**/*
      - dist/**/*
extraMetadata:
  main: electron/main.cjs
electronVersion: 42.4.0
